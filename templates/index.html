{% extends "base.html" %}

{% block title %}SummerTravel{% endblock %}

{% block content %}
<section class="galvenais">
    <h1>Welcome</h1>
    <p>Welcome to the best options for vacations <br> this summer for you!</p>
    <div class="hero_btns">
        {% for c in continents %}
        <a href="{{ url_for('continent', continent_id=c['id']) }}" class="action_btn">{{ c['name'] }}</a>
        {% endfor %}
    </div>
</section>
{% endblock %}
