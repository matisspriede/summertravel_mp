{% extends "base.html" %}

{% block title %}Photo Gallery – SummerTravel{% endblock %}

{% block content %}

<!-- Izveido foto galeriju, kas sadala galamērķus pa kontinentiem un katram galamērķim parāda attēlu ar nosaukumu -->
<div class="foto_main">
    <h1>Photo Gallery</h1>
    {% for continent_name, dests in all_destinations.items() %}
    <div class="gallery_section">
        <h2 class="gallery_continent_title">{{ continent_name }}</h2>
        <div class="gallery_grid">
            {% for dest in dests %}
            <div class="gallery_card">
                <img src="{{ url_for('static', filename='images/' ~ dest['image']) }}"
                     alt="{{ dest['name'] }}">
                <span class="gallery_label">{{ dest['name'] }}</span>
            </div>
            {% endfor %}
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
